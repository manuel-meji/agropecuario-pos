# ========================================================
# AGROPECUARIO POS - PRODUCTION CONFIGURATION
# ========================================================

# --- Database ---
# Set these in your environment variables for better security:
# DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/agropecuario_pos?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_PRODUCTION_PASSWORD

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# --- JWT & Encryption ---
# CHANGE THESE FOR PRODUCTION!
agropecuario.app.jwtSecret=generate_a_long_random_string_here
agropecuario.app.dbEncryptionKey=1234567890123456

# --- Hacienda API (PRODUCTION) ---
hacienda.ambiente=prod

hacienda.api.token.url=https://idp.comprobanteselectronicos.go.cr/auth/realms/rut/protocol/openid-connect/token
hacienda.api.client.id=api-prod
hacienda.api.username=cpf-02-XXXX-XXXX@comprobanteselectronicos.go.cr
hacienda.api.password=YOUR_PRODUCTION_API_PASSWORD

hacienda.api.recepcion.url=https://api.comprobanteselectronicos.go.cr/recepcion/v1/recepcion
hacienda.api.base.url=https://api.comprobanteselectronicos.go.cr/recepcion/v1

# --- Emisor Data ---
hacienda.emisor.nombre=YOUR_BUSINESS_NAME
hacienda.emisor.cedula=3XXXXXXXX
hacienda.emisor.tipo.cedula=01
hacienda.emisor.provincia=1
hacienda.emisor.canton=01
hacienda.emisor.distrito=01
hacienda.emisor.barrio=01
hacienda.emisor.otras.senas=Detailed Address Here
hacienda.emisor.actividad.economica=XXXXXX
hacienda.emisor.email=admin@yourdomain.com
hacienda.emisor.telefono=88888888

# --- Cryptographic Key ---
hacienda.crypto.keystore.path=C:/path/to/your/production_cert.p12
hacienda.crypto.keystore.password=YOUR_CERT_PASSWORD

# --- Server ---
server.port=80
logging.level.root=INFO
logging.level.com.agropecuariopos=INFO
